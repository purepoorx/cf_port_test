name: Build Binaries

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: 386
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: 7
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: 386
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOARM: ${{ matrix.goarm }}
      CGO_ENABLED: 0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: go test ./...

      - name: Compute output name
        shell: bash
        run: |
          suffix="${GOOS}-${GOARCH}"
          if [[ -n "${GOARM:-}" ]]; then
            suffix="${suffix}v${GOARM}"
          fi
          file_name="cfporttest-${suffix}"
          if [[ "$GOOS" == "windows" ]]; then
            file_name="${file_name}.exe"
          fi
          echo "FILE_NAME=${file_name}" >> "$GITHUB_ENV"

      - name: Build binary
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -buildid=" -o "dist/${FILE_NAME}" ./

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILE_NAME }}
          path: dist/${{ env.FILE_NAME }}
