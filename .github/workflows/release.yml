name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CGO_ENABLED: 0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build Linux amd64 binary
        run: GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -buildid=" -o cfporttest ./

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ./cfporttest
